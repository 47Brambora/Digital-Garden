<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Tulip</title>

  <style>
    body {
      padding: 0;
      margin: 0;

      height: 1000px;
      width: 1000px;
    }

    .sky {
      background-color: #87CEEB;
      height: 700px;
    }

    .ground {
      background-color: #34a031;
      height: 300px;
    }

    .flower-container {
      position: absolute;

      top: 300px;
      left: 420px;
    }

    .petal {
      position: absolute;
      width: 140px;
      height: 160px;
      background-color: #E63946;

      border-radius: 0 0 50% 50%;
    }

    .triangle {
      position: absolute;
      top: -70px;
    }

    .triangle.center {
      width: 0;
      height: 0;
      left: 35px;
    
      border-bottom: 70px solid #E63946;
      border-left: 35px solid transparent;
      border-right: 35px solid transparent;
    }

    .triangle.left,
    .triangle.right {
      height: 0;
      width: 0;
      background-color: #E63946;
    
      border-bottom: solid 70px #E63946;
    }

    .triangle.left {
      left: 0;
      border-bottom: solid 70px #E63946;
      border-right: solid 35px #87CEEB;
    }

    .triangle.right {
      left: 105px;
      border-bottom: 70px solid #E63946;
      border-left: 35px solid #87CEEB;
    }

    .stem{
      background-color: #2E7D32;
      height: 400px;
      width: 10px;
      position: absolute;
      top: 160px;
      left: 65px;
    }

    .leaf.left {
      background-color: #2E7D32;
      height: 200px;
      width: 75px;

      position: absolute;
      top: 360px;

      border-radius: 0 100%;
    }

    .leaf.right {
      background-color: #2E7D32;
      height: 200px;
      width: 75px;

      position: absolute;
      top: 360px;
      left: 65px;

      border-radius: 100% 0;
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="background-container">
    <div class="sky"></div>
    <div class="ground"></div>
  </div>

  <!-- Flower -->
  <div class="flower-container">
    <div class="flover">
      <div class="petal"></div>
      <div class="triangle left"></div>
      <div class="triangle center"></div>
      <div class="triangle right"></div>
      <div class="stem"></div>
      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>
  </div>
</body>
</html>
