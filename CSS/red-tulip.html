<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Tulip</title>

  <style>
    body {
      padding: 0;
      margin: 0;

      height: 500px;
      width: 500px;
    }

    .sky {
      background-color: #87CEEB;
      height: 350px;
    }

    .ground {
      background-color: #34a031;
      height: 150px;
    }

    .flower-container {
      position: absolute;
      top: 150px;
      left: 215px;
    }

    .petal {
      position: absolute;
      width: 70px;
      height: 80px;
      background-color: #E63946;

      border-radius: 0 0 50% 50%;
    }

    .triangle {
      position: absolute;
      top: -35px;
    }

    .triangle.center {
      width: 0;
      height: 0;
      left: 17.5px;
    
      border-bottom: 35px solid #E63946;
      border-left: 17.5px solid transparent;
      border-right: 17.5px solid transparent;
    }

    .triangle.left,
    .triangle.right {
      height: 0;
      width: 0;
      background-color: #E63946;
    
      border-bottom: solid 35px #E63946;
    }

    .triangle.left {
      left: 0;
      border-bottom: solid 35px #E63946;
      border-right: solid 17.5px #87CEEB;
    }

    .triangle.right {
      left: 52.5px;
      border-bottom: 35px solid #E63946;
      border-left: 17.5px solid #87CEEB;
    }

    .stem{
      background-color: #2E7D32;
      height: 180px;
      width: 5px;
      position: absolute;
      top: 80px;
      left: 32.5px;
    }

    .leaf.left {
      background-color: #2E7D32;
      height: 100px;
      width: 37.5px;

      position: absolute;
      top: 180px;

      border-radius: 0 100%;
    }

    .leaf.right {
      background-color: #2E7D32;
      height: 100px;
      width: 37.5px;

      position: absolute;
      top: 180px;
      left: 32.5px;

      border-radius: 100% 0;
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="background-container">
    <div class="sky"></div>
    <div class="ground"></div>
  </div>

  <!-- Flower -->
  <div class="flower-container">
    <div class="flover">
      <div class="petal"></div>
      <div class="triangle left"></div>
      <div class="triangle center"></div>
      <div class="triangle right"></div>
      <div class="stem"></div>
      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>
  </div>
</body>
</html>
