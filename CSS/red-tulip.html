<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Tulip</title>

  <style>
    :root {
      --sky: #87CEEB;
      --flower: #E63946;
      --ground: #34A031;
      --stem: #2E7D32;
    }

    body {
      padding: 0;
      margin: 0;

      height: 500px;
      width: 500px;
    }

    .sky {
      background-color: var(--sky);
      height: 350px;
    }

    .ground {
      background-color: var(--ground);
      height: 150px;
    }

    .flower-container {
      position: absolute;
      top: 150px;
      left: 215px;
    }

    .petal {
      position: absolute;
      width: 70px;
      height: 80px;
      background-color: var(--flower);

      border-radius: 0 0 50% 50%;
    }

    .triangle {
      position: absolute;
      top: -35px;
    }

    .triangle.center {
      width: 0;
      height: 0;
      left: 17.5px;
    
      border-bottom: 35px solid var(--flower);
      border-left: 17.5px solid transparent;
      border-right: 17.5px solid transparent;
    }

    .triangle.left,
    .triangle.right {
      height: 0;
      width: 0;
      background-color: var(--flower);
    
      border-bottom: solid 35px var(--flower);
    }

    .triangle.left {
      left: 0;
      border-bottom: solid 35px var(--flower);
      border-right: solid 17.5px var(--sky);
    }

    .triangle.right {
      left: 52.5px;
      border-bottom: 35px solid var(--flower);
      border-left: 17.5px solid var(--sky);
    }

    .stem{
      background-color: var(--stem);
      height: 180px;
      width: 5px;
      position: absolute;
      top: 80px;
      left: 32.5px;
    }

    .leaf.left {
      background-color: var(--stem);
      height: 100px;
      width: 37.5px;

      position: absolute;
      top: 180px;

      border-radius: 0 100%;
    }

    .leaf.right {
      background-color: var(--stem);
      height: 100px;
      width: 37.5px;

      position: absolute;
      top: 180px;
      left: 32.5px;

      border-radius: 100% 0;
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="background-container">
    <div class="sky"></div>
    <div class="ground"></div>
  </div>

  <!-- Flower -->
  <div class="flower-container">
    <div class="flover">
      <div class="petal"></div>
      <div class="triangle left"></div>
      <div class="triangle center"></div>
      <div class="triangle right"></div>
      <div class="stem"></div>
      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>
  </div>
</body>
</html>
